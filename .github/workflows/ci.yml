name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      e2e:
        description: 'Run the browser e2e against production'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # ignore-scripts: skip the native `canvas` build pulled in by mind-ar.
      - run: npm ci --ignore-scripts
      - run: npm run build

  e2e-production:
    # Manual only: writes real blobs and tests the deployed site, so we don't
    # run it on every push. Trigger from the Actions tab with "Run e2e" checked.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.e2e }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - run: node tests/e2e.mjs https://arcomic.vercel.app
